<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Presta Prenda Enrich - Éxito</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <main class="page">
    <header class="topbar">
      <button class="back-btn" aria-label="Atrás" onclick="goBack('review.html')">&#8249;</button>
      <div class="logo">Presta Prenda</div>
      <div></div>
    </header>

    <section class="content">
      <div class="center-success">
        <span class="eyebrow">Paso 7 · Publicación</span>
        <div class="check-circle" aria-hidden="true"></div>
        <h1 style="font-size:30px;">¡Prenda publicada!</h1>
        <p class="text-secondary">La prenda ya está disponible en el catálogo.</p>

        <div class="actions-stack">
          <button id="newItemBtn" class="btn btn-secondary" type="button">Enriquecer otra prenda</button>
          <button id="catalogBtn" class="btn btn-secondary" type="button">Ver catálogo</button>
        </div>

        <article class="card stat-card">
          <p id="pendingText" style="font-weight:700;"></p>
          <p class="text-secondary small mt-4">Puedes regresar al inicio para repetir el recorrido o volver al preview para revisar la ficha generada.</p>
        </article>
      </div>
    </section>
  </main>

  <script src="js/nav.js"></script>
  <script src="js/state.js"></script>
  <script src="js/tutorial.js"></script>
  <script>
    /* Renders a pending-items metric so completion state feels contextual. */
    function renderPendingStat() {
      var pending = getState(StateKeys.pendingCount, 7);
      document.getElementById('pendingText').textContent = String(pending) + ' prendas pendientes de enriquecer';
    }

    document.addEventListener('DOMContentLoaded', function () {
      renderPendingStat();

      document.getElementById('newItemBtn').addEventListener('click', function () {
        resetFunnelState();
        goTo('index.html');
      });

      document.getElementById('catalogBtn').addEventListener('click', function () {
        goTo('preview.html');
      });
    });
  </script>
</body>
</html>
