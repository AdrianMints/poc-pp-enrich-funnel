    /* Extended catalog used by the search path (includes already-enriched items). */
    var skuCatalog = pendingItems.concat([
      { sku: 'ANI-9900', title: 'Anillo tres piedras oro blanco', categoria: 'Anillo', kilataje: '18', peso: '5.1', precioLista: '$15,200', precioVenta: '$13,800', descuento: '9.2%' },

    ]);

    var selectedItem = null;

    /* Pagination state for the pending list. */
    var PAGE_SIZE = 20;
    var listPage = 0;
    var sortedPendingItems = pendingItems.slice().sort(function (a, b) {
      return a.title.localeCompare(b.title, 'es-MX');
    });

    function normalizeText(value) {
      return (value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim();
    }

    function itemMatchesQuery(item, query) {
      var normalizedQuery = normalizeText(query);
      if (!normalizedQuery) {
        return true;
      }

      var sku = normalizeText(item.sku);
      if (sku.indexOf(normalizedQuery) === 0) {
        return true;
      }

      var words = normalizeText(item.title).split(/[^a-z0-9]+/);
      return words.some(function (word) {
        return word && word.indexOf(normalizedQuery) === 0;
      });
    }

    function getFilteredPendingItems() {
      var normalized = normalizeText(currentFilterQuery);
      if (!normalized) {
        return sortedPendingItems;
      }
      return sortedPendingItems.filter(function (item) {
        return itemMatchesQuery(item, normalized);
      });
    }

    /* Serializes an item to the previewData shape consumed by preview.html. */
    function buildPreviewData(item) {
      return {
        sku: item.sku,
        categoria: item.categoria,
        marca: item.marca || '',
        modelo: item.modelo || '',
        origenSucursal: item.categoria === 'Reloj' ? 'Sucursal' : '',
        kilataje: item.kilataje,
        peso: item.peso,
        precioLista: item.precioLista,
        precioVenta: item.precioVenta,
        descuento: item.descuento
      };
    }

    /* Updates CTA button state based on whether an item has been chosen. */
    function refreshCta() {
      var btn = document.getElementById('continueBtn');
      if (selectedItem) {
        btn.textContent = 'Enriquecer ' + selectedItem.sku;
        btn.disabled = false;
        btn.style.opacity = '1';
      } else {
        btn.textContent = 'Selecciona una prenda para continuar';
        btn.disabled = true;
        btn.style.opacity = '0.45';
      }
    }

    /* Marks an item as selected across both list and search paths. */
    function selectItem(item) {
      selectedItem = item;
      setState(StateKeys.sku, item.sku);
      setState(StateKeys.category, item.categoria);
      setState(StateKeys.previewData, buildPreviewData(item));
      document.querySelectorAll('.pending-item').forEach(function (el) {
        el.classList.toggle('selected', el.dataset.sku === item.sku);
      });
      document.getElementById('skuInput').value = item.sku;
      refreshCta();
    }

    /* Builds a single pending item card element. */
    function buildPendingCard(item) {
      var card = document.createElement('button');
      card.className = 'pending-item';
      card.type = 'button';
      card.dataset.sku = item.sku;
      card.innerHTML =
        '<div class="pending-item-left">' +
          '<span class="pending-item-sku">' + item.sku + '</span>' +
          '<span class="pending-item-title">' + item.title + '</span>' +
        '</div>' +
        '<div class="pending-item-right">' +
          '<span class="badge badge-navy">' + item.categoria + '</span>' +
          '<span class="pending-item-price">' + item.precioVenta + '</span>' +
        '</div>';
      card.addEventListener('click', function () { selectItem(item); });
      return card;
    }

    /* Appends the next page of items before the scroll sentinel. */
    function loadMorePending() {
      var list = document.getElementById('pendingList');
      var sentinel = document.getElementById('listSentinel');
      if (!sentinel) { return; }

      var source = getFilteredPendingItems();
      var start = listPage * PAGE_SIZE;
      var slice = source.slice(start, start + PAGE_SIZE);
      slice.forEach(function (item) {
        list.insertBefore(buildPendingCard(item), sentinel);
      });
      listPage++;
      if (listPage * PAGE_SIZE >= source.length) {
        sentinel.remove();
      }
    }

    function initInfiniteScroll() {
      var list = document.getElementById('pendingList');
      var sentinel = document.getElementById('listSentinel');
      if (!sentinel || !('IntersectionObserver' in window)) {
        return;
      }
      if (pendingObserver) {
        pendingObserver.disconnect();
      }
      pendingObserver = new IntersectionObserver(function (entries) {
        if (entries[0].isIntersecting) { loadMorePending(); }
      }, { root: list, threshold: 0 });
      pendingObserver.observe(sentinel);
    }

    /* Initialises the list with pagination and infinite scroll. */
    function initPendingList() {
      var list = document.getElementById('pendingList');
      list.innerHTML = '<div id="listSentinel" style="height:1px;visibility:hidden;"></div>';
      listPage = 0;
      loadMorePending();
      initInfiniteScroll();
    }

    /* Re-renders list as the user types instead of using a dropdown. */
    function applyPendingFilter(query) {
      currentFilterQuery = query || '';
      var list = document.getElementById('pendingList');
      if (pendingObserver) {
        pendingObserver.disconnect();
      }

      if (!currentFilterQuery.trim()) {
        initPendingList();
        return;
      }

      var source = getFilteredPendingItems();
      list.innerHTML = '';
      if (source.length === 0) {
        list.innerHTML = '<div class="demo-note" style="padding:10px 12px;">Sin coincidencias. Intenta con otro término.</div>';
        return;
      }

      source.forEach(function (item) {
        list.appendChild(buildPendingCard(item));
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      var catalogSize = pendingItems.length;
      var storedCatalogSize = getState('pp.pendingCatalogSize', null);
      var pending = getState(StateKeys.pendingCount, catalogSize);

      if (storedCatalogSize !== catalogSize) {
        pending = catalogSize;
        setState(StateKeys.pendingCount, pending);
        setState('pp.pendingCatalogSize', catalogSize);
      }

      document.getElementById('pendingCount').textContent = pending;

      initPendingList();
      refreshCta();

      var skuInput = document.getElementById('skuInput');
      skuInput.addEventListener('input', function () {
        applyPendingFilter(skuInput.value);
      });

      document.getElementById('continueBtn').addEventListener('click', function () {
        if (!selectedItem) {
          return;
        }
        goTo('preview.html');
      });
    });
