            <div style="display:flex;align-items:center;gap:8px;">
              <button id="regenTitleBtn" class="btn btn-secondary ai-regen-btn" type="button" style="min-height:30px;padding:0 10px;font-size:12px;"><svg class="ai-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 2.5l1.5 3.7 3.9 1.6-3.9 1.6L12 13l-1.5-3.6-3.9-1.6 3.9-1.6L12 2.5z"></path><path d="M18.2 11.8l.9 2.2 2.3.9-2.3.9-.9 2.2-.9-2.2-2.3-.9 2.3-.9.9-2.2z"></path><path d="M7 13.5l1.2 2.9 3 .1-2.3 1.9.8 2.9L7 19.6l-2.7 1.7.8-2.9-2.3-1.9 3-.1L7 13.5z"></path></svg><span>Regenerar</span></button>
            </div>
          </div>
          <input id="titleInput" class="input" type="text" value="">
          <p id="titleThinkingHint" class="text-secondary small" style="display:none; margin-top:8px;">Consultando IA para regenerar titulo...</p>

        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <label class="field-label" for="descriptionInput" style="margin:0;">Descripción</label>
            <div style="display:flex;align-items:center;gap:8px;">
              <button id="regenDescBtn" class="btn btn-secondary ai-regen-btn" type="button" style="min-height:30px;padding:0 10px;font-size:12px;"><svg class="ai-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 2.5l1.5 3.7 3.9 1.6-3.9 1.6L12 13l-1.5-3.6-3.9-1.6 3.9-1.6L12 2.5z"></path><path d="M18.2 11.8l.9 2.2 2.3.9-2.3.9-.9 2.2-.9-2.2-2.3-.9 2.3-.9.9-2.2z"></path><path d="M7 13.5l1.2 2.9 3 .1-2.3 1.9.8 2.9L7 19.6l-2.7 1.7.8-2.9-2.3-1.9 3-.1L7 13.5z"></path></svg><span>Regenerar</span></button>
            </div>

          <p id="descriptionThinkingHint" class="text-secondary small" style="display:none; margin-top:8px;">Consultando IA para regenerar descripcion...</p>
        </div>
      </article>

    <div class="sticky-bar">
      <button id="publishBtn" class="btn btn-primary" type="button">Publicar en catálogo</button>
    </div>

    <div id="editImageModal" class="edit-image-modal" hidden>
      <div class="edit-image-backdrop" id="editImageBackdrop"></div>
      <div class="edit-image-sheet" role="dialog" aria-modal="true" aria-label="Editar imagen">

          <button class="edit-size-tab" type="button" data-size="card">Card</button>

        <div id="editVariantWrapper" class="edit-variant-wrapper">
          <img id="editVariantImage" src="" alt="Variante actual" draggable="false">
        </div>
        <div class="crop-zoom-row">
          <span class="crop-zoom-icon">−</span>

        <div class="edit-image-body">
          <label class="field-label" for="editPromptInput">Prompt para regenerar</label>

          <p id="editIaHint" class="text-secondary small" style="display:none; margin-top:4px;"></p>
          <button id="editRegenBtn" class="btn btn-primary ai-regen-btn" type="button" disabled>

              <path d="M18.2 11.8l.9 2.2 2.3.9-2.3.9-.9 2.2-.9-2.2-2.3-.9 2.3-.9.9-2.2z"></path>
              <path d="M7 13.5l1.2 2.9 3 .1-2.3 1.9.8 2.9L7 19.6l-2.7 1.7.8-2.9-2.3-1.9 3-.1L7 13.5z"></path>

    <div id="imagePreviewModal" class="image-preview-modal" hidden>
      <div class="image-preview-backdrop" data-close-preview="true"></div>
      <div class="image-preview-dialog" role="dialog" aria-modal="true" aria-label="Vista completa de imagen">
        <button id="closePreviewBtn" class="image-preview-close" type="button" aria-label="Cerrar vista completa">&times;</button>

  <script src="js/nav.js"></script>
  <script src="js/state.js"></script>
  <script src="js/tutorial.js"></script>
  <script>
    var aiResult = {
      title: '',
      description: '',
      variants: [],
      variantSizes: []
    };
    var VARIANT_COUNT = 4;
    var SIZE_FORMATS = [
      { key: 'desktop', label: 'Desktop', w: 1200, h: 628 },
      { key: 'mobile',  label: 'Mobile',  w: 390,  h: 844 },
      { key: 'card',    label: 'Card',    w: 400,  h: 500 }
    ];
    var isRegenInProgress = false;
    var isRegenTitleInProgress = false;
    var isRegenDescInProgress = false;
    var titleRegenIndex = 0;
    var descriptionRegenIndex = 0;
    var currentEditIndex = -1;
    var currentEditSizeKey = 'card';
    var cropStates = {};           // key: "idx_sizeKey" → { zoom: 1.0, ox: 0, oy: 0 }
    var cropBaseScale = 1.0;       // scale so image covers wrapper at zoom=1
    var isDragging = false;
    var dragStartX = 0, dragStartY = 0, dragStartOX = 0, dragStartOY = 0;

    function escapeXml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&apos;');
    }

    function getAiIconMarkup() {
      return '' +
        '<svg class="ai-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">' +
          '<path d="M12 2.5l1.5 3.7 3.9 1.6-3.9 1.6L12 13l-1.5-3.6-3.9-1.6 3.9-1.6L12 2.5z"></path>' +
          '<path d="M18.2 11.8l.9 2.2 2.3.9-2.3.9-.9 2.2-.9-2.2-2.3-.9 2.3-.9.9-2.2z"></path>' +
          '<path d="M7 13.5l1.2 2.9 3 .1-2.3 1.9.8 2.9L7 19.6l-2.7 1.7.8-2.9-2.3-1.9 3-.1L7 13.5z"></path>' +
        '</svg>';
    }

    /* Creates a deterministic mock image influenced by prompt + index. */
    function createGeneratedVariant(prompt, index) {
      var promptLabel = (prompt || '').trim() || 'Estudio limpio';
      var promptPreview = promptLabel.slice(0, 42);
      var seed = Date.now() + (index * 97);
      var hue = 22 + (seed % 24);
      var bgA = 'hsl(' + String(hue) + ', 82%, 93%)';
      var bgB = 'hsl(' + String(hue + 8) + ', 88%, 84%)';
      var ring = 'hsl(' + String(hue - 8) + ', 72%, 32%)';
      var shine = 'hsl(' + String(hue + 20) + ', 92%, 98%)';
      var svg =
        '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">' +
          '<defs>' +
            '<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">' +
              '<stop offset="0%" stop-color="' + bgA + '"/>' +
              '<stop offset="100%" stop-color="' + bgB + '"/>' +
            '</linearGradient>' +
          '</defs>' +
          '<rect width="400" height="560" fill="url(#bg)"/>' +
          '<circle cx="200" cy="250" r="110" fill="none" stroke="' + ring + '" stroke-width="24"/>' +
          '<ellipse cx="245" cy="205" rx="44" ry="20" fill="' + shine + '" opacity="0.55"/>' +
          '<text x="26" y="486" font-size="20" font-family="Arial, sans-serif" fill="#1A2B5E">Variante ' + String(index + 1) + '</text>' +
          '<text x="26" y="516" font-size="14" font-family="Arial, sans-serif" fill="#39456E">' + escapeXml(promptPreview) + '</text>' +
        '</svg>';
      return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
    }

    function computeVariantSeed(prompt, index) {
      var input = (prompt || '') + '|' + String(index) + '|' + String(Date.now());
      var hash = 0;
      for (var i = 0; i < input.length; i += 1) {
        hash = ((hash << 5) - hash + input.charCodeAt(i)) | 0;
      }
      return Math.abs(hash);
    }

    function createSubtleVariantFromSource(sourceSrc, prompt, index) {
      return new Promise(function (resolve) {
        if (!sourceSrc) {
          resolve(createGeneratedVariant(prompt, index));
          return;
        }

        var image = new Image();
        image.onload = function () {
          var width = image.naturalWidth || 400;
          var height = image.naturalHeight || 560;
          var canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          var ctx = canvas.getContext('2d');
          var seed = computeVariantSeed(prompt, index);

          var brightness = 0.96 + ((seed % 11) / 100);
          var contrast = 0.95 + (((seed >> 3) % 13) / 100);
          var saturation = 0.97 + (((seed >> 6) % 11) / 100);
          var zoom = 0.985 + (((seed >> 9) % 31) / 1000);
          var rotation = ((((seed >> 12) % 41) - 20) / 10) * (Math.PI / 180);
          var offsetX = (((seed >> 15) % 9) - 4);
          var offsetY = (((seed >> 18) % 9) - 4);
          var warmth = (((seed >> 21) % 11) - 5);

          ctx.fillStyle = '#FFFFFF';
          ctx.fillRect(0, 0, width, height);

          ctx.save();
          ctx.translate((width / 2) + offsetX, (height / 2) + offsetY);
          ctx.rotate(rotation);
          ctx.scale(zoom, zoom);
          ctx.filter = 'brightness(' + String(brightness) + ') contrast(' + String(contrast) + ') saturate(' + String(saturation) + ')';
          ctx.drawImage(image, -width / 2, -height / 2, width, height);
          ctx.restore();

          if (warmth !== 0) {
            var alpha = 0.015 * Math.abs(warmth);
            ctx.fillStyle = warmth > 0
              ? 'rgba(255, 168, 120, ' + String(alpha) + ')'
              : 'rgba(120, 165, 255, ' + String(alpha) + ')';
            ctx.fillRect(0, 0, width, height);
          }

          resolve(canvas.toDataURL('image/jpeg', 0.93));
        };

        image.onerror = function () {
          resolve(createGeneratedVariant(prompt, index));
        };

        image.src = sourceSrc;
      });
    }

    function ensureVariantCount() {
      if (!Array.isArray(aiResult.variants)) {
        aiResult.variants = [];
      }
      aiResult.variants = aiResult.variants.slice(0, VARIANT_COUNT);
      while (aiResult.variants.length < VARIANT_COUNT) {
        aiResult.variants.push(createGeneratedVariant('', aiResult.variants.length));
      }
    }

    function persistAiResult() {
      setState(StateKeys.aiResult, aiResult);
    }

    function hasPromptValue() {
      var promptInput = document.getElementById('editPromptInput');
      return !!(promptInput && promptInput.value && promptInput.value.trim());
    }

    function updateImageRegenButtonsState() {
      var editRegenBtn = document.getElementById('editRegenBtn');
      var enabled = hasPromptValue() && !isRegenInProgress;
      if (editRegenBtn) {
        editRegenBtn.disabled = !enabled;
      }
    }

    function updateTitleRegenState() {
      var regenTitleBtn = document.getElementById('regenTitleBtn');
      var titleInput = document.getElementById('titleInput');
      if (regenTitleBtn) { regenTitleBtn.disabled = isRegenTitleInProgress || isRegenInProgress; }
      if (titleInput) { titleInput.disabled = isRegenTitleInProgress; }
    }

    function updateDescRegenState() {
      var regenDescBtn = document.getElementById('regenDescBtn');
      var descriptionInput = document.getElementById('descriptionInput');
      if (regenDescBtn) { regenDescBtn.disabled = isRegenDescInProgress || isRegenInProgress; }
      if (descriptionInput) { descriptionInput.disabled = isRegenDescInProgress; }
    }

    function updateTextRegenButtonsState() {
      updateTitleRegenState();
      updateDescRegenState();
    }

    function wait(ms) {
      return new Promise(function (resolve) {
        window.setTimeout(resolve, ms);
      });
    }

    function setRegenerationBusy(isBusy, message, target) {
      isRegenInProgress = isBusy;

      var hints = {
        images: document.getElementById('iaThinkingHint'),
        title: document.getElementById('titleThinkingHint'),
        description: document.getElementById('descriptionThinkingHint')
      };

      Object.keys(hints).forEach(function (key) {
        if (hints[key]) {
          hints[key].style.display = 'none';
        }
      });

      if (isBusy && target && hints[target]) {
        hints[target].textContent = message || 'Consultando IA...';
        hints[target].style.display = 'block';
      }

      updateImageRegenButtonsState();
      updateTextRegenButtonsState();
    }

    function runWithIaDelay(task, message, target) {
      if (isRegenInProgress) {
        return Promise.resolve();
      }

      var startedAt = Date.now();
      setRegenerationBusy(true, message, target);
      return Promise.resolve()
        .then(task)
        .then(function (result) {
          var elapsed = Date.now() - startedAt;
          var remaining = Math.max(0, 1000 - elapsed);
          return wait(remaining).then(function () {
            return result;
          });
        })
        .finally(function () {
          setRegenerationBusy(false);
        });
    }

    function openImagePreview(src, alt) {
      var modal = document.getElementById('imagePreviewModal');
      var preview = document.getElementById('previewImage');
      preview.src = src;
      preview.alt = alt || 'Vista completa';
      modal.hidden = false;
      document.body.style.overflow = 'hidden';
    }

    function closeImagePreview() {
      var modal = document.getElementById('imagePreviewModal');
      var preview = document.getElementById('previewImage');
      modal.hidden = true;
      preview.src = '';
      document.body.style.overflow = '';
    }

    function getCropStateKey() {
      return String(currentEditIndex) + '_' + currentEditSizeKey;
    }

    function getCropState() {
      var key = getCropStateKey();
      if (!cropStates[key]) cropStates[key] = { zoom: 1.0, ox: 0, oy: 0 };
      return cropStates[key];
    }

    function computeBaseScale(img, wrapper) {
      var iw = img.naturalWidth || 1;
      var ih = img.naturalHeight || 1;
      var ww = wrapper.clientWidth || 1;
      var wh = wrapper.clientHeight || 1;
      var scaleByW = ww / iw;
      var scaleByH = wh / ih;
      return Math.max(scaleByW, scaleByH);
    }

    function clampCropOffset(state) {
      var img = document.getElementById('editVariantImage');
      var wrapper = document.getElementById('editVariantWrapper');
      if (!img || !wrapper) return;
      var effW = (img.naturalWidth || 1) * cropBaseScale * state.zoom;
      var effH = (img.naturalHeight || 1) * cropBaseScale * state.zoom;
      var ww = wrapper.clientWidth;
      var wh = wrapper.clientHeight;
      var maxOX = Math.max(0, (effW - ww) / 2);
      var maxOY = Math.max(0, (effH - wh) / 2);
      state.ox = Math.min(maxOX, Math.max(-maxOX, state.ox));
      state.oy = Math.min(maxOY, Math.max(-maxOY, state.oy));
    }

    function renderCropPreview() {
      var img = document.getElementById('editVariantImage');
      if (!img) return;
      var state = getCropState();
      var s = cropBaseScale * state.zoom;
      img.style.transform =
        'translate(-50%, -50%) ' +
        'translate(' + state.ox.toFixed(1) + 'px, ' + state.oy.toFixed(1) + 'px) ' +
        'scale(' + s.toFixed(4) + ')';
      var slider = document.getElementById('cropZoomSlider');
      if (slider) slider.value = String(Math.round(state.zoom * 100));
    }

    function exportCurrentCrop() {
      return new Promise(function (resolve) {
        var img = document.getElementById('editVariantImage');
        var wrapper = document.getElementById('editVariantWrapper');
        if (!img || !wrapper || !img.src) { resolve(null); return; }
        var state = getCropState();
        var fmt = getEditFormat();
        var natW = img.naturalWidth;
        var natH = img.naturalHeight;
        var ww = wrapper.clientWidth;
        var wh = wrapper.clientHeight;
        var dispScale = cropBaseScale * state.zoom;
        /* top-left of image in wrapper CSS space */
        var imgLeft = ww / 2 + state.ox - natW * dispScale / 2;
        var imgTop  = wh / 2 + state.oy - natH * dispScale / 2;
        /* visible crop in natural image pixels */
        var cropX = -imgLeft / dispScale;
        var cropY = -imgTop  / dispScale;
        var cropW = ww / dispScale;
        var cropH = wh / dispScale;
        var outW = Math.min(fmt.w, 900);
        var outH = Math.round(outW * (fmt.h / fmt.w));
        var canvas = document.createElement('canvas');
        canvas.width = outW; canvas.height = outH;
        var srcImg = new Image();
        srcImg.onload = function () {
          canvas.getContext('2d').drawImage(srcImg, cropX, cropY, cropW, cropH, 0, 0, outW, outH);
          resolve(canvas.toDataURL('image/jpeg', 0.92));
        };
        srcImg.onerror = function () { resolve(img.src); };
        srcImg.src = img.src;
      });
    }

    function initCropForCurrentTab() {
      var img = document.getElementById('editVariantImage');
      var wrapper = document.getElementById('editVariantWrapper');
      if (!img || !wrapper) return;
      var key = getCropStateKey();
      if (!cropStates[key]) cropStates[key] = { zoom: 1.0, ox: 0, oy: 0 };
      if (img.complete && img.naturalWidth) {
        cropBaseScale = computeBaseScale(img, wrapper);
        renderCropPreview();
      } else {
        img.onload = function () {
          cropBaseScale = computeBaseScale(img, wrapper);
          renderCropPreview();
        };
      }
    }

    function cropToAspectRatio(src, targetW, targetH) {
      return new Promise(function (resolve) {
        var img = new Image();
        img.onload = function () {
          var srcW = img.naturalWidth;
          var srcH = img.naturalHeight;
          var tRatio = targetW / targetH;
          var sRatio = srcW / srcH;
          var cropW, cropH, ox, oy;
          if (sRatio > tRatio) {
            cropH = srcH; cropW = srcH * tRatio; ox = (srcW - cropW) / 2; oy = 0;
          } else {
            cropW = srcW; cropH = srcW / tRatio; ox = 0; oy = (srcH - cropH) / 2;
          }
          var outW = Math.min(targetW, 800);
          var outH = Math.round(outW / tRatio);
          var canvas = document.createElement('canvas');
          canvas.width = outW; canvas.height = outH;
          canvas.getContext('2d').drawImage(img, ox, oy, cropW, cropH, 0, 0, outW, outH);
          resolve(canvas.toDataURL('image/jpeg', 0.92));
        };
        img.onerror = function () { resolve(src); };
        img.src = src;
      });
    }

    function getEditFormat() {
      for (var i = 0; i < SIZE_FORMATS.length; i++) {
        if (SIZE_FORMATS[i].key === currentEditSizeKey) return SIZE_FORMATS[i];
      }
      return SIZE_FORMATS[2];
    }

    function updateEditVariantPreview() {
      var img = document.getElementById('editVariantImage');
      var wrapper = document.getElementById('editVariantWrapper');
      var fmt = getEditFormat();
      var src = aiResult.variants[currentEditIndex] || '';
      if (img) {
        img.src = src;
        img.alt = 'Variante ' + String(currentEditIndex + 1) + ' – ' + fmt.label;
        img.style.transform = '';
      }
      if (wrapper) wrapper.style.aspectRatio = String(fmt.w) + ' / ' + String(fmt.h);
      /* slight delay to let layout settle before computing base scale */
      window.requestAnimationFrame(function () { initCropForCurrentTab(); });
    }

    function updateEditSizeTabs() {
      document.querySelectorAll('.edit-size-tab').forEach(function (tab) {
        tab.classList.toggle('active', tab.dataset.size === currentEditSizeKey);
      });
    }

    function selectEditSize(key) {
      currentEditSizeKey = key;
      updateEditSizeTabs();
      updateEditVariantPreview();
    }

    function openEditImageModal(index) {
      currentEditIndex = index;
      currentEditSizeKey = 'card';
      var modal = document.getElementById('editImageModal');
      var promptEl = document.getElementById('editPromptInput');
      var hint = document.getElementById('editIaHint');
      if (promptEl) promptEl.value = '';
      if (hint) hint.style.display = 'none';
      updateEditSizeTabs();
      updateEditVariantPreview();
      modal.hidden = false;
      document.body.style.overflow = 'hidden';
      updateImageRegenButtonsState();
    }

    function closeEditImageModal() {
      document.getElementById('editImageModal').hidden = true;
      document.body.style.overflow = '';
      currentEditIndex = -1;
    }

    function bindEditImageModal() {
      var wrapper = document.getElementById('editVariantWrapper');

      document.getElementById('closeEditBtn').addEventListener('click', closeEditImageModal);
      document.getElementById('editImageBackdrop').addEventListener('click', closeEditImageModal);

      document.querySelectorAll('.edit-size-tab').forEach(function (tab) {
        tab.addEventListener('click', function () { selectEditSize(tab.dataset.size); });
      });

      /* ── Drag to pan ── */
      function onDragStart(cx, cy) {
        if (currentEditIndex < 0) return;
        isDragging = true;
        var state = getCropState();
        dragStartX = cx; dragStartY = cy;
        dragStartOX = state.ox; dragStartOY = state.oy;
        wrapper.classList.add('dragging');
      }
      function onDragMove(cx, cy) {
        if (!isDragging) return;
        var state = getCropState();
        state.ox = dragStartOX + (cx - dragStartX);
        state.oy = dragStartOY + (cy - dragStartY);
        clampCropOffset(state);
        renderCropPreview();
      }
      function onDragEnd() {
        isDragging = false;
        if (wrapper) wrapper.classList.remove('dragging');
      }

      wrapper.addEventListener('mousedown', function (e) { e.preventDefault(); onDragStart(e.clientX, e.clientY); });
      window.addEventListener('mousemove', function (e) { onDragMove(e.clientX, e.clientY); });
      window.addEventListener('mouseup', onDragEnd);

      wrapper.addEventListener('touchstart', function (e) {
        if (e.touches.length === 1) { e.preventDefault(); onDragStart(e.touches[0].clientX, e.touches[0].clientY); }
      }, { passive: false });
      wrapper.addEventListener('touchmove', function (e) {
        if (e.touches.length === 1) { e.preventDefault(); onDragMove(e.touches[0].clientX, e.touches[0].clientY); }
      }, { passive: false });
      wrapper.addEventListener('touchend', onDragEnd);

      /* ── Zoom slider ── */
      document.getElementById('cropZoomSlider').addEventListener('input', function () {
        if (currentEditIndex < 0) return;
        var state = getCropState();
        state.zoom = Number(this.value) / 100;
        clampCropOffset(state);
        renderCropPreview();
      });

      document.getElementById('editPromptInput').addEventListener('input', function () {
        updateImageRegenButtonsState();
      });

      /* ── Regenerar imagen ── */
      document.getElementById('editRegenBtn').addEventListener('click', function () {
        if (isRegenInProgress || currentEditIndex < 0) { return; }
        var index = currentEditIndex;
        var fmt = getEditFormat();
        var prompt = document.getElementById('editPromptInput').value || '';
        var hint = document.getElementById('editIaHint');
        var btn = document.getElementById('editRegenBtn');

        isRegenInProgress = true;
        if (btn) btn.disabled = true;
        if (hint) { hint.textContent = 'Consultando IA para regenerar ' + fmt.label + '...'; hint.style.display = 'block'; }

        var startedAt = Date.now();
        exportCurrentCrop()
          .then(function (cropped) {
            return createSubtleVariantFromSource(cropped || aiResult.variants[index], prompt, index);
          })
          .then(function (nextVariant) {
            var remaining = Math.max(0, 1000 - (Date.now() - startedAt));
            return wait(remaining).then(function () { return nextVariant; });
          })
          .then(function (nextVariant) {
            aiResult.variants[index] = nextVariant;
            /* reset crop state for this variant so it re-fits the new image */
            var key = getCropStateKey();
            cropStates[key] = { zoom: 1.0, ox: 0, oy: 0 };
            persistAiResult();
            renderVariants();
            if (currentEditIndex === index) updateEditVariantPreview();
          })
          .finally(function () {
            isRegenInProgress = false;
            if (hint) hint.style.display = 'none';
            updateImageRegenButtonsState();
          });
      });

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape' && !document.getElementById('editImageModal').hidden) {
          closeEditImageModal();
        }
      });
    }

    function bindPreviewModal() {
      var modal = document.getElementById('imagePreviewModal');
      var closeBtn = document.getElementById('closePreviewBtn');
      closeBtn.addEventListener('click', closeImagePreview);
      modal.addEventListener('click', function (event) {
        if (event.target.closest('[data-close-preview="true"]')) {
          closeImagePreview();
        }
      });
      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape' && !modal.hidden) {
          closeImagePreview();
        }
      });
    }

    function toSeoSlugPart(value, fallback) {
      var text = String(value || '').trim();
      if (!text) {
        return fallback || '';
      }
      return text
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-zA-Z0-9\s-]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function buildSeoTitleParts(prompt) {
      var category = toSeoSlugPart(getState(StateKeys.category, 'Joya'), 'Joya');
      var preview = getState(StateKeys.previewData, {});
      var details = getState(StateKeys.details, {});
      var isWatch = category === 'Reloj';
      var promptKey = toSeoSlugPart((prompt || '').split(/[,.]/)[0], '');
      var shortPrompt = promptKey ? promptKey.slice(0, 28) : '';
      var tipoOro = Array.isArray(details.tipoOro) && details.tipoOro.length > 0
        ? toSeoSlugPart(details.tipoOro[0], 'amarillo').toLowerCase()
        : 'amarillo';
      var kilataje = toSeoSlugPart(preview.kilataje || '14', '14');
      var measurement = toSeoSlugPart(details.measurement || '', '');
      var genero = toSeoSlugPart(details.genero || '', '').toLowerCase();

      if (isWatch) {
        return {
          isWatch: true,
          keyword: 'Reloj',
          marca: toSeoSlugPart(preview.marca, 'Marca'),
          modelo: toSeoSlugPart(preview.modelo, 'Modelo'),
          genero: genero,
          shortPrompt: shortPrompt
        };
      }

      return {
        isWatch: false,
        keyword: category,
        tipoOro: tipoOro,
        kilataje: kilataje,
        measurement: measurement,
        shortPrompt: shortPrompt
      };
    }

    function buildRegeneratedTitleOptions(prompt) {
      var parts = buildSeoTitleParts(prompt);
      if (parts.isWatch) {
        var extraWatch = parts.shortPrompt ? ' ' + parts.shortPrompt : '';
        var watchAudience = parts.genero && parts.genero !== 'unisex' ? ' ' + parts.genero : '';
        return [
          'Reloj ' + parts.marca + ' ' + parts.modelo + watchAudience,
          'Reloj ' + parts.marca + ' ' + parts.modelo + ' acero original' + watchAudience,
          'Reloj ' + parts.marca + ' ' + parts.modelo + ' cronografo de caballero',
          'Reloj ' + parts.marca + ' ' + parts.modelo + extraWatch,
          'Reloj ' + parts.marca + ' modelo ' + parts.modelo + ' para catalogo'
        ];
      }

      var goldSpec = parts.kilataje && parts.kilataje !== 'N/A'
        ? parts.kilataje + 'k'
        : '';
      var measurementSuffix = parts.measurement ? ' talla/medida ' + parts.measurement : '';
      var promptSuffix = parts.shortPrompt ? ' ' + parts.shortPrompt : '';

      return [
        parts.keyword + ' de oro ' + parts.tipoOro + ' ' + goldSpec + measurementSuffix,
        parts.keyword + ' oro ' + parts.tipoOro + ' ' + goldSpec + ' acabado brillante',
        parts.keyword + ' de oro ' + goldSpec + ' estilo clasico' + measurementSuffix,
        parts.keyword + ' de oro ' + parts.tipoOro + promptSuffix,
        parts.keyword + ' de oro ' + goldSpec + ' para catalogo digital'
      ];
    }

    function buildRegeneratedDescriptionOptions(prompt) {
      var category = getState(StateKeys.category, 'pieza');
      var sku = getState(StateKeys.sku, 'SKU-DEMO-001');
      var preview = getState(StateKeys.previewData, {});
      var promptText = (prompt || '').trim();
      var direction = promptText
        ? 'Toma sugerida: ' + promptText + '. '
        : 'Fotografía sugerida en fondo neutro con luz suave. ';
      if (category === 'Reloj') {
        var marca = preview.marca || 'Marca no especificada';
        var modelo = preview.modelo || 'Modelo no especificado';
        return [
          'Reloj ' + marca + ' ' + modelo + ' con datos precargados de sucursal. ' + direction + 'Referencia visual: ' + sku + '.',
          'Pieza de relojeria ' + marca + ' ' + modelo + ' en muy buen estado estético y funcional. ' + direction + 'SKU de referencia: ' + sku + '.',
          'Reloj ' + marca + ' ' + modelo + ' ideal para publicacion inmediata en catalogo. ' + direction + 'Control interno: ' + sku + '.',
          'Modelo ' + modelo + ' de ' + marca + ' con presencia solida y buena lectura de caratula. ' + direction + 'Referencia: ' + sku + '.',
          'Reloj de marca ' + marca + ' con modelo identificado (' + modelo + '). ' + direction + 'Ficha vinculada al SKU ' + sku + '.'
        ];
      }
      return [
        'Diseño de ' + category.toLowerCase() + ' elaborado en oro, ideal para catálogo digital. ' + direction + 'Referencia visual: ' + sku + '.',
        category + ' con acabado brillante y buena presencia visual para venta en linea. ' + direction + 'SKU: ' + sku + '.',
        'Pieza de ' + category.toLowerCase() + ' en condiciones visibles de uso, con detalles definidos. ' + direction + 'Control: ' + sku + '.',
        category + ' de oro con estilo clasico y versatil para uso diario o regalo. ' + direction + 'Referencia interna: ' + sku + '.',
        'Articulo de ' + category.toLowerCase() + ' con toma sugerida para destacar volumen y acabado. ' + direction + 'Vinculo de ficha: ' + sku + '.'
      ];
    }

    /* Draws generated variant cards with per-item edit actions. */
    function renderVariants() {
      var row = document.getElementById('variantRow');
      row.innerHTML = '';
      aiResult.variants.forEach(function (src, index) {
        var card = document.createElement('article');
        card.className = 'variant-card';
        card.innerHTML =
          '<img src="' + src + '" alt="Variante ' + String(index + 1) + '">' +
          '<div class="variant-footer">' +
            '<button class="btn btn-secondary edit-one-btn" type="button" data-index="' + String(index) + '">' +
              'Editar imagen' +
            '</button>' +
          '</div>';
        row.appendChild(card);
      });

      row.querySelectorAll('.edit-one-btn').forEach(function (button) {
        button.addEventListener('click', function () {
          openEditImageModal(Number(button.dataset.index || 0));
        });
      });

      row.querySelectorAll('.variant-card img').forEach(function (image, index) {
        image.addEventListener('click', function () {
          openImagePreview(image.src, 'Variante ' + String(index + 1));
        });
      });
    }

    function bindRegeneration() {
      var regenTitleBtn = document.getElementById('regenTitleBtn');
      var regenDescBtn = document.getElementById('regenDescBtn');
      var titleInput = document.getElementById('titleInput');
      var descriptionInput = document.getElementById('descriptionInput');

      regenTitleBtn.addEventListener('click', function () {
        if (isRegenTitleInProgress || isRegenInProgress) { return; }
        var startedAt = Date.now();
        isRegenTitleInProgress = true;
        updateTitleRegenState();
        var hint = document.getElementById('titleThinkingHint');
        if (hint) { hint.textContent = 'Consultando IA para regenerar titulo...'; hint.style.display = 'block'; }
        var options = buildRegeneratedTitleOptions('');
        var current = (aiResult.title || '').trim();
        var next = options[titleRegenIndex % options.length];
        if (next.trim() === current) {
          titleRegenIndex += 1;
          next = options[titleRegenIndex % options.length];
        }
        aiResult.title = next;
        titleRegenIndex += 1;
        wait(Math.max(0, 1000 - (Date.now() - startedAt))).then(function () {
          titleInput.value = aiResult.title;
          persistAiResult();
          isRegenTitleInProgress = false;
          if (hint) { hint.style.display = 'none'; }
          updateTitleRegenState();
        });
      });

      regenDescBtn.addEventListener('click', function () {
        if (isRegenDescInProgress || isRegenInProgress) { return; }
        var startedAt = Date.now();
        isRegenDescInProgress = true;
        updateDescRegenState();
        var hint = document.getElementById('descriptionThinkingHint');
        if (hint) { hint.textContent = 'Consultando IA para regenerar descripcion...'; hint.style.display = 'block'; }
        var options = buildRegeneratedDescriptionOptions('');
        var current = (aiResult.description || '').trim();
        var next = options[descriptionRegenIndex % options.length];
        if (next.trim() === current) {
          descriptionRegenIndex += 1;
          next = options[descriptionRegenIndex % options.length];
        }
        aiResult.description = next;
        descriptionRegenIndex += 1;
        wait(Math.max(0, 1000 - (Date.now() - startedAt))).then(function () {
          descriptionInput.value = aiResult.description;
          persistAiResult();
          isRegenDescInProgress = false;
          if (hint) { hint.style.display = 'none'; }
          updateDescRegenState();
        });
      });
    }

    /* Persists edited content on user input. */
    function bindEditing() {
      var titleInput = document.getElementById('titleInput');
      var descInput = document.getElementById('descriptionInput');

      titleInput.addEventListener('input', function () {
        aiResult.title = titleInput.value;
        setState(StateKeys.aiResult, aiResult);
      });

      descInput.addEventListener('input', function () {
        aiResult.description = descInput.value;
        setState(StateKeys.aiResult, aiResult);
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      aiResult = getState(StateKeys.aiResult, aiResult);
      if (!aiResult || typeof aiResult !== 'object') {
        aiResult = { title: '', description: '', variants: [] };
      }
      if (!Array.isArray(aiResult.variants) || aiResult.variants.length === 0) {
        aiResult = buildFallbackAiResult();
        setState(StateKeys.aiResult, aiResult);
      }

      document.getElementById('titleInput').value = aiResult.title || '';
      document.getElementById('descriptionInput').value = aiResult.description || '';

      ensureVariantCount();
      persistAiResult();

      renderVariants();
      updateTextRegenButtonsState();
      bindEditing();
      bindRegeneration();
      bindPreviewModal();
      bindEditImageModal();

      document.getElementById('publishBtn').addEventListener('click', function () {
        var pending = getState(StateKeys.pendingCount, 42);
        setState(StateKeys.pendingCount, Math.max(0, pending - 1));
        goTo('success.html');
      });
    });
  </script>
</body>
</html>
